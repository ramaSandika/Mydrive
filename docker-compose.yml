version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: mydrive_minio
    ports:
      - "9000:9000"
      - "8900:8900"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":8900"
    volumes:
      - minio_data:/data
    networks:
      - mydrive_network

  mysql:
    image: mysql:8.0
    container_name: mydrive_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: mydrive_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mydrive_network

volumes:
  minio_data:
  mysql_data:

networks:
  mydrive_network:
    driver: bridge